<div class="mx-auto max-w-[1200px] py-6">
    <psv-back-button class="mb-6" [navigateTo]="backRoute()">Continue Shopping</psv-back-button>
    @if(store.selectedProduct(); as product) {
    <div class="flex gap-8 mb-8">
        <img [src]="product.imageUrl" [alt]="product.name" class="w-[500px] h-[550px] object-cover rounded-lg"
            [style.view-transition-name]="'product-image' + product.id" />
        <div class="flex-1">
            <psv-product-info [product]="product" />
        </div>
    </div>
    <psv-view-reviews [product]="product" />
    }

</div>
