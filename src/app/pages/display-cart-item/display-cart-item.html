<div class="grid grid-cols-3 grid-cols-[3fr_1fr_1fr]">
    <div class="flex items-center gap-4">
        <img [src]="cartItem().product.imageUrl" alt="cartItem().product.name" class="w-24 h-24 rounded-lg object-cover"
            [style.view-transition-name]="'product-image' + cartItem().product.id" />
        <div>
            <div class="text-gray-900 text-lg font-semibold">{{ cartItem().product.name }}</div>
            <div class="text-gray-600 text-lg">${{ cartItem().product.price }}</div>
        </div>
    </div>
    <psv-qty-selector [quantity]="cartItem().quantity"
        (quantityUpdated)="store.setItemQuantity({id: cartItem().product.id, quantity: $event})"></psv-qty-selector>

    <div class="flex flex-col items-end">
        <div class="text-right font-semibold text-lg">
            ${{ total() }}
        </div>
        <div class="flex -me-3">
            <button matIconButton (click)="store.moveToWishlist(cartItem().product)">
                <mat-icon>favorite_border</mat-icon>
            </button>
            <button matIconButton (click)="store.removeFromCart(cartItem().product)" class="danger">
                <mat-icon>delete</mat-icon>
            </button>
        </div>

    </div>
</div>
