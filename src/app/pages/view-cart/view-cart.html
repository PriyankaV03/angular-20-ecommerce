<div class="mx-auto max-w-[1200px] py-6">
    <psv-back-button class="mb-6" navigateTo="/products/all">Continue Shopping</psv-back-button>
    <h1 class="text-3xl font-extrabold mb-4">Shopping Cart</h1>

    <psv-tease-wishlist class="mb-6 block" />

    <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
        <div class="lg:col-span-2">
            <psv-list-cart-items />
        </div>
        <div class="">
            <psv-order-summary>
                <ng-container actionButtons>
                    <button class="w-full mt-6 py-3" matButton="filled" (click)="store.proceedToCheckout()">
                        Proceed to Checkout
                    </button>
                </ng-container>
            </psv-order-summary>
        </div>
    </div>
